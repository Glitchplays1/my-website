<!DOCTYPE html>
<html>
<head>
<title>1 Second World Saver</title>
<style>
body { font-family: Arial; text-align: center; background: #111; color: white; }
button { padding: 10px 20px; margin: 10px; font-size: 16px; }
</style>
</head>
<body>

<h1>🌍 1 Second World Saver</h1>

<p id="stats"></p>
<p id="timer"></p>

<button onclick="choice('green')">🌱 Green Energy</button>
<button onclick="choice('war')">💣 Military Boost</button>
<button onclick="choice('edu')">📚 Education</button>

<script>
let stats = {
  climate: 50,
  economy: 50,
  peace: 50,
  resources: 50,
  education: 50
};

let time = 120;

function update() {
  document.getElementById("stats").innerHTML =
    `🌡️ ${stats.climate} | 💰 ${stats.economy} | 🕊️ ${stats.peace} | 🍞 ${stats.resources} | 🧠 ${stats.education}`;

  document.getElementById("timer").innerHTML = "Time: " + time;

  if (Object.values(stats).some(v => v <= 0)) {
    alert("💀 World Collapsed!");
    location.reload();
  }

  if (time <= 0) {
    alert("🏆 You Survived!");
    location.reload();
  }
}

function choice(type) {
  if (type === 'green') {
    stats.climate += 10;
    stats.economy -= 5;
  }
  if (type === 'war') {
    stats.peace -= 10;
    stats.economy += 5;
  }
  if (type === 'edu') {
    stats.education += 10;
    stats.economy -= 3;
  }
  update();
}

setInterval(() => {
  time--;
  update();
}, 1000);

update();
</script>

</body>
</html>
