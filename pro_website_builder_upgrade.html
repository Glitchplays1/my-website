<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Site</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { padding:20px; text-align:center; font-size:28px; }
.hero { text-align:center; padding:50px; }
.btn { padding:12px 20px; background:#38bdf8; border:none; cursor:pointer; transition:0.3s; }
.btn:hover { background:#0ea5e9; transform:scale(1.1); }
.card { background:#1e293b; padding:20px; margin:10px; border-radius:10px; transition:0.3s; }
.card:hover { transform:translateY(-10px); }
.grid { display:flex; flex-wrap:wrap; justify-content:center; }
#three { width:100%; height:300px; }
textarea { width:100%; height:150px; }
@media(max-width:600px){ .grid{flex-direction:column;} }
</style>
</head>
<body>

<header>🚀 My Pro Website</header>

<div id="three"></div>

<section class="hero">
<h1>Welcome to my site</h1>
<p>Modern UI + 3D + AI Builder</p>
<button class="btn" onclick="scrollToBuilder()">Start Building</button>
</section>

<div class="grid">
<div class="card">🔥 Fast</div>
<div class="card">📱 Mobile Ready</div>
<div class="card">🎨 Animated</div>
</div>

<section style="padding:20px">
<h2>🧠 AI Website Generator</h2>
<textarea id="aiInput" placeholder="Describe your website..."></textarea>
<button class="btn" onclick="generateAI()">Generate</button>
</section>

<section style="padding:20px">
<h2>🛠 Builder</h2>
<textarea id="code"></textarea>
<button class="btn" onclick="publish()">🔘 Publish</button>
<iframe id="preview" style="width:100%; height:200px;"></iframe>
</section>

<script>
function scrollToBuilder(){ window.scrollTo({top:600, behavior:'smooth'}); }

function generateAI(){
  const text = document.getElementById('aiInput').value;
  const template = `<h1>${text}</h1><p>This site was AI generated.</p>`;
  document.getElementById('code').value = template;
  update();
}

function update(){
  document.getElementById('preview').srcdoc = document.getElementById('code').value;
}

function publish(){
  alert('Publish this by uploading to GitHub Pages');
}

// LIVE update
setInterval(update,1000);

// 3D
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/300, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, 300);
document.getElementById('three').appendChild(renderer.domElement);

const geo = new THREE.TorusKnotGeometry();
const mat = new THREE.MeshBasicMaterial({wireframe:true});
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

camera.position.z = 5;

function animate(){
 requestAnimationFrame(animate);
 mesh.rotation.x += 0.01;
 mesh.rotation.y += 0.01;
 renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
